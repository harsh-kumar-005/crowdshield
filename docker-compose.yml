version: '3.9'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: crowdshield_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: crowdshield
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Node.js Backend API ──────────────────────────────────────────
  backend:
    build: ./backend
    container_name: crowdshield_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crowdshield}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Python ML Engine ─────────────────────────────────────────────
  ml-engine:
    build: ./ml-engine
    container_name: crowdshield_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1

  # ── React Frontend (nginx) ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: crowdshield_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ml-engine

volumes:
  postgres_data:
